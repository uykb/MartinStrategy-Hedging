exchange:
  api_key: ""
  api_secret: ""
  use_testnet: true

strategies:
  - name: "HYPE_Long"
    symbol: "HYPEUSDT"
    direction: "long"
    enabled: true
    capital_weight: 1.0
    max_safety_orders: 9
    atr_period: 14

  - name: "LIT_Short"
    symbol: "LITUSDT"
    direction: "short"
    enabled: true
    capital_weight: 1.0
    max_safety_orders: 9
    atr_period: 14

hedge:
  enabled: true
  ratio: 1.0
  rebalance_threshold: 0.15

notification:
  discord_webhook_url: ""
  enabled: true
  notify_open: true
  notify_close: true
  notify_safety: true
  notify_tp: true
  notify_hedge_alert: true

storage:
  sqlite_path: "bot.db"
  redis_addr: "localhost:6379"
  redis_pass: ""
  redis_db: 0

log:
  level: "info"
